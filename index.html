<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Auto Strength</title>
  <meta name="description" content="Weight selection for your lifts" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Auto Strength" />
  <meta name="theme-color" content="#080d19" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { background: #080d19; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    input::placeholder { color: #334155; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ─── Prescription Logic ──────────────────────────────────────────────

    const MAIN_PCT_TABLE = {
      "1-10": 1.00, "1-9.5": 0.97, "1-9": 0.95, "1-8.5": 0.94, "1-8": 0.93, "1-7.5": 0.91,
      "2-9.5": 0.94, "2-9": 0.925, "2-8.5": 0.915, "2-8": 0.90, "2-7.5": 0.89, "2-7": 0.87,
      "3-9": 0.90, "3-8.5": 0.885, "3-8": 0.87, "3-7.5": 0.86, "3-7": 0.85, "3-6.5": 0.84,
      "4-8.5": 0.86, "4-8": 0.85, "4-7.5": 0.845, "4-7": 0.83, "4-6.5": 0.815, "4-6": 0.80,
      "5-8": 0.83, "5-7.5": 0.815, "5-7": 0.80, "5-6.5": 0.79, "5-6": 0.77, "5-5.5": 0.76,
      "6-7.5": 0.785, "6-7": 0.77, "6-6.5": 0.775, "6-6": 0.75, "6-5.5": 0.74, "6-5": 0.73,
    };

    const AUX_PCT_TABLE = {
      6: 0.85, 6.5: 0.84, 7: 0.825, 7.5: 0.815,
      8: 0.80, 8.5: 0.785, 9: 0.77, 9.5: 0.76,
      10: 0.75, 10.5: 0.74, 11: 0.73, 11.5: 0.72,
      12: 0.71, 12.5: 0.70, 13: 0.69, 13.5: 0.68,
      14: 0.67, 14.5: 0.66, 15: 0.65,
    };

    const AUX_KEYS = Object.keys(AUX_PCT_TABLE).map(Number).sort((a, b) => a - b);

    function clampAuxLookup(rmw) {
      if (rmw <= AUX_KEYS[0]) return AUX_KEYS[0];
      if (rmw >= AUX_KEYS[AUX_KEYS.length - 1]) return AUX_KEYS[AUX_KEYS.length - 1];
      const rounded = Math.round(rmw * 2) / 2;
      if (AUX_PCT_TABLE[rounded] !== undefined) return rounded;
      let closest = AUX_KEYS[0];
      for (const k of AUX_KEYS) {
        if (Math.abs(k - rmw) < Math.abs(closest - rmw)) closest = k;
      }
      return closest;
    }

    function mround(value, multiple) {
      return Math.round(value / multiple) * multiple;
    }

    function getMainPrescription(oneRM, restDays, feel) {
      if (!oneRM || oneRM <= 0) return null;
      const sets = restDays < 2 ? 2 : restDays < 4 ? 3 : 4;
      const reps = 6 - feel;
      const rpe = 5 + (restDays + feel) / 2;
      const key = `${reps}-${rpe}`;
      const pct = MAIN_PCT_TABLE[key];
      if (pct === undefined) return { sets, reps, rpe, weight: 0, pct: 0 };
      const weight = mround(oneRM * pct, 5);
      return { sets, reps, rpe: Math.round(rpe * 10) / 10, weight, pct: Math.round(pct * 100) };
    }

    function getAuxPrescription(oneRM, restDays, feel) {
      if (!oneRM || oneRM <= 0) return null;
      const sets = restDays < 1 ? 1 : restDays < 3 ? 2 : 3;
      const reps = feel < 2 ? 10 : feel < 4 ? 8 : 6;
      const rpe = 5 + (restDays + feel) / 2;
      const rmw = reps + (10 - rpe);
      const key = clampAuxLookup(rmw);
      const pct = AUX_PCT_TABLE[key];
      const weight = mround(oneRM * pct, 5);
      return { sets, reps, rpe: Math.round(rpe * 10) / 10, weight, pct: Math.round(pct * 100) };
    }

    // ─── Default Lifts ───────────────────────────────────────────────────

    const DEFAULT_LIFTS = [
      { id: "1", name: "Back Squat", oneRM: 0 },
      { id: "2", name: "Front Squat", oneRM: 0 },
      { id: "3", name: "Box Squat", oneRM: 0 },
      { id: "4", name: "Pin Squat", oneRM: 0 },
      { id: "5", name: "Deadlift", oneRM: 0 },
      { id: "6", name: "Trap Bar Deadlift", oneRM: 0 },
      { id: "7", name: "Hang Clean", oneRM: 0 },
      { id: "8", name: "Power Clean", oneRM: 0 },
      { id: "9", name: "Bench Press", oneRM: 0 },
      { id: "10", name: "Pause Bench Press", oneRM: 0 },
      { id: "11", name: "Overhead Press", oneRM: 0 },
      { id: "12", name: "Pull Up (BW+)", oneRM: 0 },
      { id: "13", name: "Chin Up (BW+)", oneRM: 0 },
    ];

    const STORAGE_KEY = "autostrength-lifts-v3";

    function loadLifts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveLifts(lifts) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(lifts)); }
      catch (e) { console.error("Storage save failed:", e); }
    }

    // ─── Components ──────────────────────────────────────────────────────

    const FEEL_LABELS = ["Wrecked", "Bad", "Meh", "OK", "Good", "Great"];
    const FEEL_COLORS = ["#ef4444", "#f97316", "#eab308", "#a3e635", "#22c55e", "#10b981"];

    const btnBase = {
      width: 44, height: 44, borderRadius: 12, border: "1px solid rgba(255,255,255,0.1)",
      fontSize: 22, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
      fontWeight: 700, transition: "all 0.15s",
    };

    function Stepper({ label, value, onChange, min, max, displayValue }) {
      return (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          background: "rgba(255,255,255,0.03)", borderRadius: 14, padding: "10px 14px",
          border: "1px solid rgba(255,255,255,0.05)",
        }}>
          <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={() => onChange(Math.max(min, value - 1))} disabled={value <= min}
              style={{ ...btnBase, background: value <= min ? "rgba(255,255,255,0.01)" : "rgba(255,255,255,0.06)", color: value <= min ? "#1e293b" : "#e2e8f0" }}>−</button>
            <span style={{ minWidth: 72, textAlign: "center", fontSize: 17, fontWeight: 700, color: "#f1f5f9" }}>
              {displayValue || value}
            </span>
            <button onClick={() => onChange(Math.min(max, value + 1))} disabled={value >= max}
              style={{ ...btnBase, background: value >= max ? "rgba(255,255,255,0.01)" : "rgba(255,255,255,0.06)", color: value >= max ? "#1e293b" : "#e2e8f0" }}>+</button>
          </div>
        </div>
      );
    }

    function PrescriptionCard({ title, prescription, accentColor }) {
      if (!prescription) {
        return (
          <div style={{
            background: "rgba(255,255,255,0.025)", borderRadius: 18, padding: "24px 18px",
            border: `1px solid ${accentColor}18`, position: "relative", overflow: "hidden", textAlign: "center",
          }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${accentColor}44, ${accentColor}11)` }} />
            <div style={{ fontSize: 11, color: accentColor, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 10 }}>{title}</div>
            <div style={{ fontSize: 14, color: "#475569" }}>Set a 1RM to see your prescription</div>
          </div>
        );
      }
      const { sets, reps, rpe, weight, pct } = prescription;
      return (
        <div style={{
          background: "rgba(255,255,255,0.025)", borderRadius: 18, padding: "18px 18px 14px",
          border: `1px solid ${accentColor}18`, position: "relative", overflow: "hidden",
        }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${accentColor}, ${accentColor}33)` }} />
          <div style={{ fontSize: 11, color: accentColor, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 14 }}>{title}</div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 8, marginBottom: 16 }}>
            <span style={{ fontSize: 56, fontWeight: 400, color: "#f1f5f9", lineHeight: 1, letterSpacing: 1, fontFamily: "'Bebas Neue', sans-serif" }}>{weight}</span>
            <span style={{ fontSize: 16, color: "#475569", fontWeight: 600, paddingBottom: 8 }}>lbs</span>
            <span style={{ fontSize: 13, color: "#334155", paddingBottom: 9, marginLeft: "auto" }}>{pct}% 1RM</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {[{ label: "Sets", val: sets }, { label: "Reps", val: reps }, { label: "RPE", val: rpe }].map(({ label, val }) => (
              <div key={label} style={{ background: "rgba(255,255,255,0.035)", borderRadius: 12, padding: "10px 0", textAlign: "center" }}>
                <div style={{ fontSize: 10, color: "#475569", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 3 }}>{label}</div>
                <div style={{ fontSize: 24, fontWeight: 400, color: "#cbd5e1", fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 1 }}>{val}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LiftDropdown({ lifts, selectedId, onChange, label, onEdit1RM }) {
      const [open, setOpen] = useState(false);
      const selected = lifts.find(l => l.id === selectedId);
      const [editing1RM, setEditing1RM] = useState(false);
      const [editValue, setEditValue] = useState("");

      const startEdit = (e) => {
        e.stopPropagation();
        if (selected) { setEditValue(selected.oneRM ? selected.oneRM.toString() : ""); setEditing1RM(true); }
      };

      const saveEdit = () => {
        const val = Number(editValue);
        if (val >= 0 && selected) onEdit1RM(selected.id, val);
        setEditing1RM(false);
      };

      return (
        <div style={{ position: "relative" }}>
          <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
          <button onClick={() => { if (!editing1RM) setOpen(!open); }}
            style={{
              width: "100%", padding: "12px 14px", borderRadius: 14, border: "1px solid rgba(255,255,255,0.07)",
              background: "rgba(255,255,255,0.03)", color: "#e2e8f0", fontSize: 15, fontWeight: 600,
              cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
            <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{selected ? selected.name : "Select lift"}</span>
            <span style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
              {selected && !editing1RM && (
                <span onClick={startEdit} style={{
                  color: selected.oneRM ? "#94a3b8" : "#475569", fontSize: 13, padding: "4px 10px", borderRadius: 8,
                  background: "rgba(255,255,255,0.05)", cursor: "pointer", border: "1px solid rgba(255,255,255,0.06)",
                }}>
                  {selected.oneRM ? `${selected.oneRM} lbs` : "Set 1RM"}
                </span>
              )}
              {editing1RM && (
                <span onClick={e => e.stopPropagation()} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <input type="number" value={editValue} onChange={e => setEditValue(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") saveEdit(); }} autoFocus placeholder="1RM"
                    style={{ width: 64, padding: "4px 6px", borderRadius: 8, border: "1px solid rgba(59,130,246,0.4)", background: "rgba(59,130,246,0.1)", color: "#e2e8f0", fontSize: 14, textAlign: "center", outline: "none" }} />
                  <button onClick={saveEdit} style={{ padding: "4px 10px", borderRadius: 8, border: "none", background: "rgba(34,197,94,0.2)", color: "#22c55e", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>SAVE</button>
                  <button onClick={(e) => { e.stopPropagation(); setEditing1RM(false); }} style={{ padding: "4px 8px", borderRadius: 8, border: "none", background: "rgba(255,255,255,0.05)", color: "#64748b", fontSize: 12, cursor: "pointer" }}>✕</button>
                </span>
              )}
              {!editing1RM && <span style={{ color: "#334155", fontSize: 11, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>}
            </span>
          </button>
          {open && (
            <>
              <div style={{ position: "fixed", inset: 0, zIndex: 40 }} onClick={() => setOpen(false)} />
              <div style={{
                position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50,
                background: "#1a2332", borderRadius: 14, marginTop: 4,
                border: "1px solid rgba(255,255,255,0.1)", maxHeight: 260, overflowY: "auto",
                boxShadow: "0 20px 50px rgba(0,0,0,0.6)",
              }}>
                {lifts.map(lift => (
                  <button key={lift.id} onClick={() => { onChange(lift.id); setOpen(false); }}
                    style={{
                      width: "100%", padding: "12px 14px", border: "none",
                      background: lift.id === selectedId ? "rgba(59,130,246,0.1)" : "transparent",
                      color: "#e2e8f0", fontSize: 14, cursor: "pointer", textAlign: "left",
                      display: "flex", justifyContent: "space-between", borderBottom: "1px solid rgba(255,255,255,0.03)",
                    }}>
                    <span style={{ fontWeight: lift.id === selectedId ? 600 : 400 }}>{lift.name}</span>
                    <span style={{ color: "#475569", fontSize: 13 }}>{lift.oneRM || "—"}</span>
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── Manage Lifts with Drag Reorder ──────────────────────────────────

    function ManageLiftsModal({ lifts, onSave, onClose }) {
      const [editLifts, setEditLifts] = useState(() => lifts.map(l => ({ ...l })));
      const [newName, setNewName] = useState("");
      const [newRM, setNewRM] = useState("");
      const [dragIdx, setDragIdx] = useState(null);
      const [overIdx, setOverIdx] = useState(null);
      const dragItem = useRef(null);
      const listRef = useRef(null);

      const updateLift = (id, field, val) => setEditLifts(prev => prev.map(l => l.id === id ? { ...l, [field]: field === "oneRM" ? Number(val) || 0 : val } : l));
      const deleteLift = (id) => setEditLifts(prev => prev.filter(l => l.id !== id));
      const addLift = () => {
        if (!newName.trim()) return;
        setEditLifts(prev => [...prev, { id: Date.now().toString(), name: newName.trim(), oneRM: Number(newRM) || 0 }]);
        setNewName(""); setNewRM("");
      };

      const reorder = (fromIdx, toIdx) => {
        if (fromIdx === toIdx) return;
        setEditLifts(prev => {
          const next = [...prev];
          const [moved] = next.splice(fromIdx, 1);
          next.splice(toIdx, 0, moved);
          return next;
        });
      };

      const handleTouchStart = (e, idx) => {
        dragItem.current = idx;
        setDragIdx(idx);
      };

      const handleTouchMove = (e, idx) => {
        if (dragItem.current === null || !listRef.current) return;
        e.preventDefault();
        const touch = e.touches[0];
        const items = listRef.current.querySelectorAll("[data-drag-item]");
        let targetIdx = dragItem.current;
        for (let i = 0; i < items.length; i++) {
          const rect = items[i].getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          if (touch.clientY < mid) { targetIdx = i; break; }
          targetIdx = i;
        }
        setOverIdx(targetIdx);
      };

      const handleTouchEnd = () => {
        if (dragItem.current !== null && overIdx !== null) reorder(dragItem.current, overIdx);
        dragItem.current = null; setDragIdx(null); setOverIdx(null);
      };

      const handleDragStart = (e, idx) => {
        dragItem.current = idx; setDragIdx(idx);
        e.dataTransfer.effectAllowed = "move";
      };
      const handleDragOver = (e, idx) => { e.preventDefault(); setOverIdx(idx); };
      const handleDrop = (e, idx) => {
        e.preventDefault();
        if (dragItem.current !== null) reorder(dragItem.current, idx);
        dragItem.current = null; setDragIdx(null); setOverIdx(null);
      };
      const handleDragEnd = () => { dragItem.current = null; setDragIdx(null); setOverIdx(null); };

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "flex-end", justifyContent: "center", backdropFilter: "blur(6px)" }} onClick={onClose}>
          <div style={{ width: "100%", maxWidth: 480, maxHeight: "85vh", background: "#0f172a", borderTopLeftRadius: 24, borderTopRightRadius: 24, padding: "20px 16px 32px", overflowY: "auto", border: "1px solid rgba(255,255,255,0.08)", borderBottom: "none" }}
            onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <h2 style={{ fontSize: 22, fontWeight: 400, color: "#f1f5f9", margin: 0, fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 3 }}>Manage Lifts</h2>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", fontSize: 22, cursor: "pointer", padding: 4 }}>✕</button>
            </div>
            <div style={{ fontSize: 12, color: "#475569", marginBottom: 14 }}>Drag ≡ to reorder</div>

            <div ref={listRef}>
              {editLifts.map((lift, idx) => (
                <div key={lift.id} data-drag-item draggable
                  onDragStart={e => handleDragStart(e, idx)} onDragOver={e => handleDragOver(e, idx)}
                  onDrop={e => handleDrop(e, idx)} onDragEnd={handleDragEnd}
                  style={{
                    display: "flex", gap: 6, alignItems: "center", marginBottom: 6,
                    opacity: dragIdx === idx ? 0.4 : 1,
                    borderTop: overIdx === idx && dragIdx !== null && dragIdx > idx ? "2px solid #3b82f6" : "2px solid transparent",
                    borderBottom: overIdx === idx && dragIdx !== null && dragIdx < idx ? "2px solid #3b82f6" : "2px solid transparent",
                    transition: "opacity 0.15s",
                  }}>
                  <div onTouchStart={e => handleTouchStart(e, idx)} onTouchMove={e => handleTouchMove(e, idx)} onTouchEnd={handleTouchEnd}
                    style={{ cursor: "grab", padding: "8px 4px", color: "#475569", fontSize: 16, touchAction: "none", userSelect: "none", flexShrink: 0 }}>≡</div>
                  <input value={lift.name} onChange={e => updateLift(lift.id, "name", e.target.value)}
                    style={{ flex: 1, padding: "9px 10px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.04)", color: "#e2e8f0", fontSize: 14, minWidth: 0 }} />
                  <input type="number" value={lift.oneRM || ""} placeholder="0" onChange={e => updateLift(lift.id, "oneRM", e.target.value)}
                    style={{ width: 62, padding: "9px 6px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.04)", color: "#e2e8f0", fontSize: 14, textAlign: "center" }} />
                  <button onClick={() => deleteLift(lift.id)} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid rgba(239,68,68,0.15)", background: "rgba(239,68,68,0.06)", color: "#ef4444", fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>✕</button>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", gap: 6, marginTop: 12, marginBottom: 16 }}>
              <div style={{ width: 24 }} />
              <input placeholder="New lift name" value={newName} onChange={e => setNewName(e.target.value)}
                style={{ flex: 1, padding: "9px 10px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.04)", color: "#e2e8f0", fontSize: 14 }} />
              <input type="number" placeholder="1RM" value={newRM} onChange={e => setNewRM(e.target.value)}
                style={{ width: 62, padding: "9px 6px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.04)", color: "#e2e8f0", fontSize: 14, textAlign: "center" }} />
              <button onClick={addLift} style={{ width: 34, height: 34, borderRadius: 10, border: "1px solid rgba(34,197,94,0.15)", background: "rgba(34,197,94,0.08)", color: "#22c55e", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, flexShrink: 0 }}>+</button>
            </div>
            <button onClick={() => { onSave(editLifts); onClose(); }}
              style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg, #3b82f6, #2563eb)", color: "white", fontSize: 15, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5 }}>
              Save All Changes
            </button>
          </div>
        </div>
      );
    }

    // ─── Main App ────────────────────────────────────────────────────────

    function AutoStrength() {
      const [lifts, setLifts] = useState(() => loadLifts() || DEFAULT_LIFTS);
      const [mainLiftId, setMainLiftId] = useState(() => {
        const saved = loadLifts();
        return saved && saved.length ? saved[0].id : "1";
      });
      const [auxLiftId, setAuxLiftId] = useState(() => {
        const saved = loadLifts();
        return saved && saved.length > 1 ? saved[1].id : "2";
      });
      const [restDays, setRestDays] = useState(2);
      const [feel, setFeel] = useState(3);
      const [showManage, setShowManage] = useState(false);

      useEffect(() => { saveLifts(lifts); }, [lifts]);

      const mainLift = useMemo(() => lifts.find(l => l.id === mainLiftId), [lifts, mainLiftId]);
      const auxLift = useMemo(() => lifts.find(l => l.id === auxLiftId), [lifts, auxLiftId]);
      const mainRx = useMemo(() => mainLift ? getMainPrescription(mainLift.oneRM, restDays, feel) : null, [mainLift, restDays, feel]);
      const auxRx = useMemo(() => auxLift ? getAuxPrescription(auxLift.oneRM, restDays, feel) : null, [auxLift, restDays, feel]);

      const handleEdit1RM = useCallback((liftId, newRM) => {
        setLifts(prev => prev.map(l => l.id === liftId ? { ...l, oneRM: newRM } : l));
      }, []);

      const handleSaveLifts = useCallback((updated) => {
        setLifts(updated);
        if (!updated.find(l => l.id === mainLiftId) && updated.length) setMainLiftId(updated[0].id);
        if (!updated.find(l => l.id === auxLiftId) && updated.length) setAuxLiftId(updated[updated.length > 1 ? 1 : 0].id);
      }, [mainLiftId, auxLiftId]);

      return (
        <div style={{ minHeight: "100vh", background: "#080d19", color: "#e2e8f0", maxWidth: 480, margin: "0 auto", padding: "0 16px 40px" }}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "16px 0 12px", position: "sticky", top: 0, background: "#080d19", zIndex: 10,
            borderBottom: "1px solid rgba(255,255,255,0.03)",
          }}>
            <h1 style={{ margin: 0, fontSize: 26, fontWeight: 400, letterSpacing: 4, fontFamily: "'Bebas Neue', sans-serif", textTransform: "uppercase", color: "#e2e8f0" }}>Auto Strength</h1>
            <button onClick={() => setShowManage(true)}
              style={{ ...btnBase, width: 40, height: 40, background: "rgba(255,255,255,0.03)", color: "#64748b", fontSize: 18 }}>⚙</button>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 12, paddingTop: 12 }}>
            <LiftDropdown lifts={lifts} selectedId={mainLiftId} onChange={setMainLiftId} label="Main Lift" onEdit1RM={handleEdit1RM} />
            <LiftDropdown lifts={lifts} selectedId={auxLiftId} onChange={setAuxLiftId} label="Accessory Lift" onEdit1RM={handleEdit1RM} />
            <Stepper label="Rest Days" value={restDays} onChange={setRestDays} min={0} max={5} />
            <Stepper label="Feel" value={feel} onChange={setFeel} min={0} max={5}
              displayValue={<span style={{ color: FEEL_COLORS[feel], fontWeight: 700 }}>{feel} — {FEEL_LABELS[feel]}</span>} />
            <PrescriptionCard title={mainLift ? `${mainLift.name} — Main` : "Main Lift"} prescription={mainRx} accentColor="#3b82f6" />
            <PrescriptionCard title={auxLift ? `${auxLift.name} — Accessory` : "Accessory Lift"} prescription={auxRx} accentColor="#8b5cf6" />
          </div>

          {showManage && <ManageLiftsModal lifts={lifts} onSave={handleSaveLifts} onClose={() => setShowManage(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AutoStrength />);
  </script>
</body>
</html>
